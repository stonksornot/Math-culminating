<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Bomb Defusal - CONTROL CENTER</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-color: #0d0d0d; 
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 3vh;
            overflow: hidden;
        }

        #header-title {
            text-align: center;
            font-size: 4.5vh;
            color: #ff3333;
            text-shadow: 0 0 15px #ff0000;
            margin: 0;
            font-weight: bold;
        }

        #header-desc {
            text-align: center;
            font-size: 2vh;
            color: #888;
            margin: 1vh 0 3vh 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #main-monitor-zone {
            display: flex;
            flex: 1;
            gap: 2vw;
            height: 75vh;
        }

        #feed-container {
            flex: 1.2;
            background-color: #050505;
            border: 3px solid #ff3333;
            border-radius: 8px;
            padding: 2.5vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #tracker-panel {
            flex: 1;
            background-color: #111;
            border: 3px solid #333;
            border-radius: 8px;
            padding: 2.5vh;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .box-lbl { 
            font-size: 2vh; 
            color: #ff3333; 
            margin-top: 0;
            margin-bottom: 2vh; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 2px solid #222;
            padding-bottom: 1vh;
        }

        #feed-log {
            font-size: 1.9vh;
            flex: 1;
            overflow-y: auto;
            text-align: left;
            color: #aaa;
            line-height: 1.5;
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.8vh;
            border-bottom: 1px solid #222;
            font-size: 2.4vh;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .team-row:hover { background-color: #1a1a1a; }
        
        .dropdown-icon {
            font-size: 1.8vh;
            color: #888;
            margin-right: 1vw;
            display: inline-block;
            width: 2vw;
            text-align: center;
        }

        .team-details {
            background-color: #0a0a0a;
            border-left: 3px solid #00bcff;
            margin-bottom: 1vh;
            padding-left: 1vw;
        }

        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2vh 1.8vh;
            border-bottom: 1px dotted #222;
            font-size: 1.9vh;
            color: #ccc;
        }
        .player-row:last-child { border-bottom: none; }
        
        .status-active { color: #00bcff; font-weight: bold; }
        .status-boom { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px #ff0000; }
        .status-defused { color: #00ff66; font-weight: bold; text-shadow: 0 0 5px #00ff66; }

        .log-join { color: #00bcff; }
        .log-correct { color: #00ff66; }
        .log-wrong { color: #ff3333; }
    </style>
</head>
<body>

    <div id="header-title">Bomb Defusal Game</div>
    <div id="header-desc">Answer the questions correctly to advance. Bomb will explode if timer runs out</div>

    <div id="main-monitor-zone">
        <div id="feed-container">
            <div class="box-lbl">📡 Live Submission Stream</div>
            <div id="feed-log"></div>
        </div>

        <div id="tracker-panel">
            <div class="box-lbl" style="color: #00bcff;">Squad Standings</div>
            <div id="leaderboard-target">
                <div style="text-align:center; padding-top:10vh; color:#555;">No active squads detected. Awaiting deployment...</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const logBox = document.getElementById("feed-log");
        
        const expandedTeams = new Set();

        function addLogMessage(htmlContent) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logBox.innerHTML += `[${timestamp}] ${htmlContent}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.toggleTeam = function(teamName, safeId) {
            const detailsDiv = document.getElementById(`details-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            if (expandedTeams.has(teamName)) {
                expandedTeams.delete(teamName);
                if (detailsDiv) detailsDiv.style.display = 'none';
                if (icon) icon.innerText = '▶';
            } else {
                expandedTeams.add(teamName);
                if (detailsDiv) detailsDiv.style.display = 'block';
                if (icon) icon.innerText = '▼';
            }
        };

        socket.on('agentJoined', (data) => {
            let displayName = data.username ? `<strong>${data.username}</strong> (Squad: <strong>${data.team}</strong>)` : `<strong>${data.team}</strong>`;
            addLogMessage(`<span class="log-join">⚡ Agent Joined: ${displayName}</span>`);
        });

        socket.on('check', (data) => {
            let actorName = data.username ? `<strong>${data.username} (${data.team})</strong>` : `<strong>${data.team}</strong>`;
            
            if (data.status === 'correct') {
                addLogMessage(`<span class="log-correct">🔓 DEFUSE SUCCESS: ${actorName} cleared phase ${data.stage}!</span>`);
            } else if (data.status === 'incorrect') {
                addLogMessage(`<span class="log-wrong">❌ FIREWALL TRIPPED: ${actorName} fed corrupt code "${data.answer}". -10s penalty!</span>`);
            } else if (data.status === 'boom') {
                addLogMessage(`<span class="log-wrong">💥 You FAILED: <strong>${data.team}'s</strong> BOMB DETONATED</span>`);
            } else if (data.status === 'defused') {
                addLogMessage(`<span class="log-correct">🛡️ SAFE: <strong>${data.team}</strong> defused their bomb completely!</span>`);
            }
        });

        socket.on('leaderboardUpdate', (teamList) => {
            const container = document.getElementById('leaderboard-target');
            
            if (teamList.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding-top:10vh; color:#555;">No active squads detected. Awaiting deployment...</div>`;
                return;
            }

            let html = '';
            teamList.forEach(teamData => {
                // Generate alphanumeric-only ID to prevent syntax errors with weird squad names
                const safeId = teamData.team.replace(/\W/g, '');
                const isExpanded = expandedTeams.has(teamData.team);
                const icon = isExpanded ? '▼' : '▶';
                const detailsDisplay = isExpanded ? 'block' : 'none';

                let statusClass = 'status-active';
                let statusText = `${Math.floor(teamData.timeLeft / 60).toString().padStart(2, '0')}:${(teamData.timeLeft % 60).toString().padStart(2, '0')}`;
                
                if (teamData.status === 'boom') { 
                    statusClass = 'status-boom'; 
                    statusText = 'DESTROYED'; 
                }
                if (teamData.status === 'defused') { 
                    statusClass = 'status-defused'; 
                    statusText = 'DEFUSED'; 
                }

                // Render main squad line
                html += `
                    <div class="team-row" onclick="toggleTeam('${teamData.team.replace(/'/g, "\\'")}', '${safeId}')">
                        <div><span class="dropdown-icon" id="icon-${safeId}">${icon}</span> <strong>${teamData.team}</strong></div>
                        <div class="${statusClass}">${teamData.solvedCount} Questions | ${statusText}</div>
                    </div>
                    <div class="team-details" id="details-${safeId}" style="display: ${detailsDisplay};">
                `;

                // Loop through nested team members provided by server
                teamData.members.forEach(member => {
                    let mStatus = member.status === 'boom' ? '💀' : (member.status === 'defused' ? '🛡️' : '🟢');
                    html += `
                        <div class="player-row">
                            <span>${mStatus} ${member.username}</span>
                            <span>${member.solvedCount} solved</span>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            container.innerHTML = html;
        });
    </script>
</body>
</html>
