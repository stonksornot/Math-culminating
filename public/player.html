<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Bomb Defusal - Agent Map</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; height: 100vh; overflow: hidden; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0d0d0d; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #auth-overlay h1 { color: #ff3333; text-shadow: 0 0 10px #ff0000; margin-bottom: 3vh; font-size: 4vh; }
        #game-view { display: none; width: 100vw; height: 100vh; position: relative; }
        #timer { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); font-size: 7vh; color: #ff3333; text-shadow: 0 0 3vh #ff0000; font-weight: bold; line-height: 1; z-index: 10; }
        
        /* Map scaling container */
        #map-container { position: absolute; top: 12%; left: 0; width: 100%; height: 85%; display: flex; justify-content: center; align-items: center; }
        #radar-map { width: 100%; height: 100%; object-fit: contain; background-color: #050505; border: 0.4vh solid #00bcff; border-radius: 1vh; box-shadow: 0 0 2vh rgba(0, 188, 255, 0.2); }
        
        #defusal-interface { display: none; }
        #question-box { 
            position: absolute; 
            top: 20%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85vw; 
            height: 45vh; 
            background-color: #1a1a1a; 
            border: 0.4vh solid #333; 
            border-radius: 1vh; 
            padding: 2vh; 
            box-sizing: border-box; 
            font-size: 3.5vh; 

            /* Flexbox stacked column layout */
            display: flex; 
            flex-direction: column; 
            gap: 1.5vh; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
        }
        #control-panel { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); display: flex; gap: 2vw; }
        input[type="text"] { background-color: #151515; color: #00ff66; border: 0.3vh solid #ff3333; padding: 2vh 2.5vw; font-size: 3vh; width: 25vw; outline: none; box-shadow: 0 0 1.5vh rgba(255, 51, 51, 0.2); }
        input[type="text"]:focus { border-color: #00ff66; box-shadow: 0 0 2vh rgba(0, 255, 102, 0.4); }
        button { background-color: #222; color: #ff3333; border: 0.3vh solid #ff3333; padding: 2vh 4vw; font-size: 3vh; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        button:hover { background-color: #ff3333; color: #000; box-shadow: 0 0 3vh #ff3333; }
        #feedback-pnl { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); font-size: 2.2vh; font-weight: bold; text-align: center; width: 50vw; }
    </style>
</head>
<body>
    <div id="lobby-screen" style="display: none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:#00bcff; font-size:4vh; text-shadow:0 0 15px #00bcff; margin-bottom:1vh;">CONNECTION ESTABLISHED</h1>
        <div style="color:#888; font-size:2vh;">WAITING FOR EVERYONE...</div>
    </div>
    
    <div id="auth-overlay">
        <h1>⚠️ Algebraic Skills Activity </h1>
        <input type="text" id="username-input" placeholder="ENTER YOUR USERNAME..." style="margin-bottom: 2vh; border-color: #333; text-align: center;">
        <input type="text" id="team-name-input" placeholder="ENTER SQUAD NAME..." style="margin-bottom: 3vh; border-color: #333; text-align: center;">
        <button onclick="engageSystem()">START DEPLOYMENT</button>
    </div>

    <div id="game-view">
        <div id="timer">02:30</div>
        <div id="map-container"><canvas id="radar-map" width="1280" height="720"></canvas></div>
        
        <div id="defusal-interface">
            <div id="question-box">Synchronizing encryption keys...</div>
            <div id="control-panel">
                <input type="text" id="player-answer" placeholder="Enter answer..." autocomplete="off">
                <button id="transmit-btn" onclick="transmitCode()">DEFUSE</button>
            </div>
            <div id="feedback-pnl"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let cooldownInterval; 
        
        window.currentUsername = "";
        window.currentTeam = "";
        window.activeQuestionId = null;

        const canvas = document.getElementById('radar-map');
        const ctx = canvas.getContext('2d');
        let isNavigating = false; 
        
        let nodes = [];
        let obstacles = []; 
        let teammates = {}; 
        
        const player = { x: 640, y: 360, radius: 10, speed: 2, color: '#00ff66' };
        const keys = { w: false, a: false, s: false, d: false };

        // FIX 1: Ignore keystrokes if player is actively typing inside an input field
        window.addEventListener('keydown', (e) => { 
            if (document.activeElement.tagName === 'INPUT') return;
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; 
        });
        window.addEventListener('keyup', (e) => { 
            if (document.activeElement.tagName === 'INPUT') return;
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; 
        });

        function checkWallCollision(cx, cy, radius) {
            for (let wall of obstacles) {
                let testX = cx; 
                let testY = cy;

                if (cx < wall.x) testX = wall.x; 
                else if (cx > wall.x + wall.width) testX = wall.x + wall.width;

                if (cy < wall.y) testY = wall.y; 
                else if (cy > wall.y + wall.height) testY = wall.y + wall.height;

                let dist = Math.hypot(cx - testX, cy - testY);
                if (dist <= radius) return true;
            }
            return false;
        }

        function engageSystem() {
            const squadName = document.getElementById('team-name-input').value.trim();
            const usernameVal = document.getElementById('username-input').value.trim();

            if (!squadName || !usernameVal) return alert("ENTRY REJECTED. ENTER BOTH A VALID USERNAME AND SQUAD NAME.");

            window.currentUsername = usernameVal;
            window.currentTeam = squadName;

            socket.emit('registerTeam', { username: usernameVal, team: squadName });
            socket.emit('playerMovement', { x: player.x, y: player.y });

            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'flex'; 
            document.getElementById('game-view').style.display = 'block';

            isNavigating = false;
            requestAnimationFrame(gameLoop);

            socket.on('roundStarted', () => {
                document.getElementById("lobby-screen").style.display = 'none';
                document.getElementById("map-container").style.display = 'flex';
                document.getElementById("defusal-interface").style.display = 'none';
                isNavigating = true; 
            });
        }

        socket.on('nextWave', (newNodes) => {
            nodes = newNodes;
            const feedPnl = document.getElementById("feedback-pnl");
            feedPnl.style.color = "#00bcff";
            feedPnl.innerHTML = "WAVE CLEARED. NEW NODES INCOMING...";
            setTimeout(() => { feedPnl.innerHTML = ""; }, 3000);
        });

        socket.on('initMap', (mapData) => {
            obstacles = mapData.obstacles;
            nodes = mapData.nodes;
        });

        socket.on('teammateMoved', (data) => {
            teammates[data.id] = data;
        });

        socket.on('teammateLeft', (id) => {
            delete teammates[id];
        });

        socket.on('nodeSolvedByTeammate', (data) => {
            nodes = nodes.filter(n => n.id !== data.questionId);
            
            if (window.activeQuestionId === data.questionId) {
                alert(`NODE CLEARED BY SQUAD MEMBER: ${data.solvedBy}`);
                returnToMap();
            }
        });

        function gameLoop() {
            let nextX = player.x;
            let nextY = player.y;
            let moved = false;

            if (isNavigating) {
                if (keys.w) { nextY -= player.speed; moved = true; }
                if (keys.s) { nextY += player.speed; moved = true; }
                if (nextY - player.radius > 0 && nextY + player.radius < canvas.height && !checkWallCollision(player.x, nextY, player.radius)) {
                    player.y = nextY;
                }

                if (keys.a) { nextX -= player.speed; moved = true; }
                if (keys.d) { nextX += player.speed; moved = true; }
                if (nextX - player.radius > 0 && nextX + player.radius < canvas.width && !checkWallCollision(nextX, player.y, player.radius)) {
                    player.x = nextX;
                }

                if (moved) socket.emit('playerMovement', { x: player.x, y: player.y });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 50) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 50) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Obstacles
            obstacles.forEach(obs => {
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
            });

            // Question Nodes
            nodes.forEach(node => {
                ctx.beginPath(); 
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fillStyle = node.color; 
                ctx.fill();
                ctx.shadowBlur = 15; 
                ctx.shadowColor = node.color; 
                ctx.closePath();
                ctx.shadowBlur = 0; 

                if (isNavigating && Math.hypot(player.x - node.x, player.y - node.y) < player.radius + node.radius) {
                    triggerDefusal(node);
                }
            });

            // Teammates
            Object.values(teammates).forEach(t => {
                ctx.beginPath();
                ctx.arc(t.x, t.y, player.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00bcff'; 
                ctx.fill();
                ctx.closePath();

                ctx.fillStyle = '#aaa';
                ctx.font = '14px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText(t.username, t.x, t.y - 15);
            });

            // Local Player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color; 
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.closePath();
            ctx.shadowBlur = 0; 

            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'bold 14px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText("You", player.x, player.y - 15);

            requestAnimationFrame(gameLoop);
        }

        function triggerDefusal(node) {
            isNavigating = false; 
            
            // Clear out old leftover keys immediately when entering a terminal
            keys.w = false; keys.a = false; keys.s = false; keys.d = false;

            window.activeQuestionId = node.id;
            const question = document.getElementById('question-box');
            question.innerHTML = `<div>${node.text}</div>`;
            document.getElementById('map-container').style.display = 'none'; 
            document.getElementById('defusal-interface').style.display = 'block'; 
            document.getElementById('player-answer').focus();

            if (window.renderMathInElement) {
                renderMathInElement(question, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError : false
                });
            }
        }

        function returnToMap() {
            window.activeQuestionId = null;
            document.getElementById('defusal-interface').style.display = 'none'; 
            document.getElementById('map-container').style.display = 'flex'; 
            
            // FIX 2: Removed the arbitrary player.y += 25 bump. Node is gone, so collision naturally ends.
            isNavigating = true; 
        }

        function transmitCode() {
            const answerField = document.getElementById("player-answer");
            const guessValue = answerField.value.trim();
            if(!guessValue || answerField.disabled || window.activeQuestionId === null) return; 

            socket.emit('submit', { answer: guessValue, questionId: window.activeQuestionId });
            answerField.value = ""; 
        }

        socket.on('timerUpdate', (time) => {
            if (time < 0) time = 0;
            document.getElementById("timer").innerText = `${Math.floor(time / 60).toString().padStart(2, '0')}:${(time % 60).toString().padStart(2, '0')}`;
        });

        socket.on('feedback', (data) => {
            const feedPnl = document.getElementById("feedback-pnl");
            const answerField = document.getElementById("player-answer");
            const transmitBtn = document.getElementById("transmit-btn");

            if (data.status === 'incorrect') {
                feedPnl.style.color = '#ff3333';
                answerField.disabled = true; transmitBtn.disabled = true; transmitBtn.style.opacity = "0.4"; transmitBtn.style.cursor = "not-allowed";

                let secondsLeft = 10;
                feedPnl.innerHTML = `❌ INVALID CODE! TERMINAL LOCKED FOR ${secondsLeft}s`;

                clearInterval(cooldownInterval);
                cooldownInterval = setInterval(() => {
                    secondsLeft--;
                    if (secondsLeft <= 0) {
                        clearInterval(cooldownInterval);
                        answerField.disabled = false; transmitBtn.disabled = false; transmitBtn.style.opacity = "1"; transmitBtn.style.cursor = "pointer";
                        feedPnl.innerHTML = ""; answerField.focus();
                    } else feedPnl.innerHTML = `❌ Terminal locked for ${secondsLeft}s`;
                }, 1000);

            } else if (data.status === 'correct') {
                clearInterval(cooldownInterval);
                answerField.disabled = false; transmitBtn.disabled = false; transmitBtn.style.opacity = "1"; transmitBtn.style.cursor = "pointer";
                feedPnl.innerHTML = "";
                nodes = nodes.filter(n => n.id !== data.questionId);
                returnToMap();
            }
        });

        socket.on('gameOver', (data) => {
            clearInterval(cooldownInterval);
            isNavigating = false;
            document.getElementById('map-container').style.display = 'none';
            document.getElementById("defusal-interface").style.display = "block";
            document.getElementById("control-panel").style.display = "none";
            const qBox = document.getElementById("question-box");
            const timerEl = document.getElementById("timer");

            if (data.status === 'boom') {
                timerEl.innerText = "BOOM!";
                qBox.innerHTML = "<span style='color: #ff3333;'>THE BOMB EXPLODED</span>";
            } else {
                timerEl.innerText = "SAFE";
                timerEl.style.color = "#00ff66";
                timerEl.style.textShadow = "0 0 3vh #00ff66";
                qBox.innerHTML = "<span style='color: #00ff66;'>ALL NODES CLEARED.<br>BOMB DEFUSED SUCCESSFULLY!</span>";
            }
        });

        document.getElementById("player-answer").addEventListener("keyup", function(event) { if (event.key === "Enter") transmitCode(); });
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</body>
</html>
